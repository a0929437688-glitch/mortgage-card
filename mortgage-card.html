/* --- Header --- */
.card-header {
  position: relative; padding: 22px 20px 16px; overflow: hidden;
}
.card-header::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:130px; height:130px; border-radius:50%;
  background:rgba(255,255,255,0.1);
}
.card-header::after {
  content:''; position:absolute; bottom:-30px; left:30px;
  width:90px; height:90px; border-radius:50%;
  background:rgba(255,255,255,0.07);
}

.bank-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; position:relative; z-index:1;
}
.bank-logo {
  height: 30px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.95;
}
.bank-dept {
  font-size:10px; color:rgba(255,255,255,0.75);
  letter-spacing:1px; font-weight:500;
}

/* Agent layout: photo left, info right */
.agent-row {
  display:flex; align-items:flex-start; gap:14px;
  position:relative; z-index:1;
}
.agent-photo {
  width:60px; height:78px; border-radius:12px;
  object-fit:cover; object-position:center top;
  border:3px solid rgba(255,255,255,0.9);
  flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.agent-info { flex:1; padding-top:2px; }
.agent-role {
  font-size:10px; color:rgba(255,255,255,0.7);
  letter-spacing:1.5px; margin-bottom:3px;
}
.agent-name {
  font-family:'Noto Serif TC',serif;
  font-size:19px; font-weight:700;
  color:var(--white); letter-spacing:1px;
  text-shadow:0 1px 4px rgba(0,0,0,0.2);
  line-height:1.2;
}
.agent-name-en {
  font-size:10px; color:rgba(255,255,255,0.7);
  letter-spacing:2px; margin-top:2px;
}
.agent-dept {
  font-size:11px; color:rgba(255,255,255,0.85);
  margin-top:4px; letter-spacing:0.5px;
}

/* Contact chips in header */
.contact-chips {
  display:flex; flex-wrap:wrap; gap:5px;
  margin-top:8px; position:relative; z-index:1;
}
.chip {
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;
  padding:3px 10px;
  font-size:10px; color:white;
  display:flex; align-items:center; gap:4px;
  backdrop-filter:blur(4px);
}
.chip .ci { font-size:11px; }

.white-divider {
  height:1px;
  background:linear-gradient(90deg,rgba(255,255,255,0.45),transparent);
  margin-top:14px; position:relative; z-index:1;
}

/* --- Card Body --- */
.card-body {
  background:rgba(255,255,255,0.94);
  padding:16px 18px 12px;
  position:relative; z-index:2;
}
.section-label {
  font-size:10px; letter-spacing:2.5px;
  color:var(--teal-dark); font-weight:700;
  text-transform:uppercase; margin-bottom:9px;
}
.info-grid {
  display:flex; flex-direction:column;
  border:1px solid var(--line-light);
  border-radius:10px; overflow:hidden;
}
.info-row {
  display:flex; align-items:center;
  padding:10px 12px; border-bottom:1px solid var(--line-light);
}
.info-row:last-child { border-bottom:none; }
.info-icon {
  width:26px; height:26px; background:var(--teal-pale);
  border-radius:7px; display:flex; align-items:center;
  justify-content:center; font-size:13px;
  flex-shrink:0; margin-right:10px;
}
.info-label { font-size:11px; color:var(--muted); flex:0 0 72px; letter-spacing:0.3px; }
.info-value {
  font-size:13px; font-weight:600; color:var(--charcoal);
  flex:1; text-align:right;
  font-family:'Noto Serif TC',serif;
}
.info-value.highlight { color:var(--teal-dark); font-size:15px; }

.loan-section {
  margin-top:11px;
  background:linear-gradient(135deg,#3DBAAA,#2A8FA0);
  border-radius:12px; padding:13px 15px;
  position:relative; overflow:hidden;
}
.loan-section::before {
  content:''; position:absolute; top:-15px; right:-15px;
  width:80px; height:80px; border-radius:50%;
  background:rgba(255,255,255,0.1);
}
.loan-label {
  font-size:10px; letter-spacing:2px;
  color:rgba(255,255,255,0.75); font-weight:700;
  margin-bottom:7px; position:relative; z-index:1;
}
.loan-row {
  display:flex; justify-content:space-between;
  align-items:center; position:relative; z-index:1;
}
.loan-percent {
  font-family:'Noto Serif TC',serif;
  font-size:36px; font-weight:700; color:white; line-height:1;
}
.loan-percent sup { font-size:13px; vertical-align:super; opacity:0.75; }
.loan-amount-block { text-align:right; }
.loan-amount-label { font-size:11px; color:rgba(255,255,255,0.6); margin-bottom:2px; }
.loan-amount { font-size:21px; font-weight:700; color:white; font-family:'Noto Serif TC',serif; }
.loan-note { margin-top:7px; font-size:10px; color:rgba(255,255,255,0.45); position:relative; z-index:1; }

/* --- Footer --- */
.card-footer {
  background:rgba(255,255,255,0.94);
  padding:9px 18px 13px;
  border-top:1px solid var(--line-light);
  display:flex; justify-content:space-between; align-items:center;
  position:relative; z-index:2;
}
.footer-note { font-size:10px; color:var(--muted); }
.teal-badge {
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  color:white; font-size:10px; font-weight:700;
  padding:3px 10px; border-radius:20px; letter-spacing:1px;
}

/* ===== FORM ===== */
.form-wrap { width:100%; max-width:400px; margin-top:18px; }
.form-section-title {
  font-family:'Noto Serif TC',serif; font-size:13px;
  color:var(--teal-dark); letter-spacing:2px;
  margin-bottom:10px; padding-left:2px;
}
.form-card {
  background:white; border-radius:16px; padding:18px;
  box-shadow:0 4px 20px rgba(61,186,170,0.12);
}
.form-group { margin-bottom:12px; }
.form-group label {
  display:block; font-size:11px; color:var(--muted);
  letter-spacing:1px; margin-bottom:4px; font-weight:500;
}
.form-group input,.form-group textarea {
  width:100%; border:1.5px solid #D8F2EF; border-radius:9px;
  padding:9px 12px; font-size:14px;
  font-family:'Noto Sans TC',sans-serif; color:var(--charcoal);
  background:#FAFEFE; outline:none; transition:border-color 0.2s;
}
.form-group input:focus,.form-group textarea:focus { border-color:var(--teal); background:white; }
.form-group textarea { resize:none; height:60px; }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.slider-row { display:flex; align-items:center; gap:10px; margin-top:2px; }
.slider-row input[type=range] {
  flex:1; -webkit-appearance:none; height:4px; border-radius:4px;
  background:linear-gradient(90deg,#3DBAAA 75%,#D8F2EF 75%);
  border:none; padding:0;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  background:var(--teal); border:2px solid white;
  box-shadow:0 2px 6px rgba(0,0,0,0.2); cursor:pointer;
}
.slider-val { font-size:15px; font-weight:700; color:var(--teal-dark); min-width:32px; text-align:right; font-family:'Noto Serif TC',serif; }

.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.btn {
  padding:12px; border-radius:11px; font-size:13px; font-weight:700;
  font-family:'Noto Sans TC',sans-serif; cursor:pointer; border:none;
  letter-spacing:0.5px; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:transform 0.12s; -webkit-tap-highlight-color:transparent;
}
.btn:active { transform:scale(0.96); }
.btn-dark { background:#2D2D2D; color:white; box-shadow:0 4px 14px rgba(0,0,0,0.18); }
.btn-teal {
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  color:white; box-shadow:0 4px 14px rgba(61,186,170,0.35);
}

.toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#2D2D2D; color:white; padding:12px 24px;
  border-radius:40px; font-size:13px; font-weight:500;
  opacity:0; transition:all 0.3s ease; z-index:999;
  white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.25);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

<script>
  function liveUpdate() {
    const address = document.getElementById("f-address").value.trim();
    const price = parseFloat(document.getElementById("f-price").value);
    const parking = parseFloat(document.getElementById("f-parking").value);
    const total = parseFloat(document.getElementById("f-total").value);
    const ratio = parseFloat(document.getElementById("f-ratio").value);
    const note = document.getElementById("f-note").value.trim();

    document.getElementById("d-address").textContent = address || "—";
    document.getElementById("d-price-per-ping").textContent = !isNaN(price) ? price+" 萬／坪" : "— 萬／坪";
    document.getElementById("d-parking").textContent = !isNaN(parking) ? parking+" 萬" : "— 萬";
    document.getElementById("d-total").textContent = !isNaN(total) ? total.toLocaleString()+" 萬" : "— 萬";
    document.getElementById("d-ratio").textContent = ratio;
    document.getElementById("ratio-display").textContent = ratio;

    if (!isNaN(total) && !isNaN(ratio)) {
      document.getElementById("d-loan").textContent = Math.round(total*ratio/10).toLocaleString()+" 萬";
    } else { document.getElementById("d-loan").textContent = "— 萬"; }

    document.getElementById("d-note").textContent = note || "以上為初估，實際依銀行審核為準";

    const pct = ((ratio-5)/(9-5))*100;
    document.getElementById("f-ratio").style.background =
      "linear-gradient(90deg,#3DBAAA "+pct+"%,#D8F2EF "+pct+"%)";

    const now = new Date();
    document.getElementById("d-date").textContent =
      now.getFullYear()+"."+String(now.getMonth()+1).padStart(2,"0")+"."+String(now.getDate()).padStart(2,"0")+" 製";
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 2400);
  }

  function buildText() {
    const address = document.getElementById("f-address").value.trim()||"—";
    const price = document.getElementById("f-price").value||"—";
    const parking = document.getElementById("f-parking").value||"—";
    const total = document.getElementById("f-total").value||"—";
    const ratio = document.getElementById("f-ratio").value;
    const note = document.getElementById("f-note").value.trim();
    const loan = (!isNaN(parseFloat(total))&&!isNaN(parseFloat(ratio)))
      ? Math.round(parseFloat(total)*parseFloat(ratio)/10)+" 萬" : "—";

    let text = "【台北富邦銀行｜房貸初估】\n\n";
    text += "📍 地址："+address+"\n";
    text += "💰 每坪初估："+price+" 萬／坪\n";
    text += "🚗 車位拆計："+parking+" 萬\n";
    text += "🏠 總價約："+total+" 萬\n\n";
    text += "🧑‍💼 人況最高 "+ratio+" 成\n";
    text += "🏦 貸款金額約："+loan+"\n";
    if (note) text += "\n📝 "+note+"\n";
    text += "\n— 張嫣庭 Yen Ting Chang\n";
    text += "📱 0989-520-182\n";
    text += "💬 LINE: yenting182";
    return text;
  }

  function copyText() {
    const text = buildText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(()=>showToast("✅ 已複製到剪貼簿")).catch(()=>fallbackCopy(text));
    } else { fallbackCopy(text); }
  }

  function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); showToast("✅ 已複製到剪貼簿"); }
    catch(e) { showToast("⚠️ 請手動複製"); }
    document.body.removeChild(ta);
  }

  function generateImage() {
    showToast("⏳ 產生中…");
    html2canvas(document.getElementById("card"), {
      scale:3, useCORS:true, allowTaint:true,
      backgroundColor:"#ffffff", logging:false
    }).then(canvas => {
      document.getElementById("previewImg").src = canvas.toDataURL("image/png");
      document.getElementById("imgModal").style.display = "flex";
      showToast("✅ 長按圖片即可儲存");
    }).catch(()=>showToast("⚠️ 產生失敗，請用一鍵複製"));
  }

  function closeModal() { document.getElementById("imgModal").style.display="none"; }
  document.getElementById("imgModal").addEventListener("click",function(e){ if(e.target===this) closeModal(); });

  liveUpdate();
</script>
</body>
</html>
